# ─────────────────────────────────────────────────────────────
# Docker Compose — AI Code Reviewer
# Runs backend + frontend as a single stack
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ai_code_reviewer_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:////app/data/ai_code_reviewer.db
      - DEBUG=${DEBUG:-false}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
    volumes:
      - db_data:/app/data          # Persist SQLite database
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Streamlit Frontend ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ai_code_reviewer_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

# ── Shared Network ────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  db_data:
    driver: local
